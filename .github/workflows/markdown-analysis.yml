name: markdown-analysis-workflow
permissions:
    contents: read

on:
    push:
        branches:
        - main
    pull_request:
        branches:
        - main
        paths:
        - '**/*.md'

jobs:
    markdown-analysis-job:
        runs-on: ubuntu-latest
        name: 'github actions: markdownlint'
        steps:
        -   name: Checkout repository
            uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        -   name: markdownlint
            uses: nosborn/github-action-markdown-cli@508d6cefd8f0cc99eab5d2d4685b1d5f470042c1 # v3
            with:
                files: .
                config_file: ./.github/.markdownlint.yml
        -   name: markdown link check
            uses: gaurav-nelson/github-action-markdown-link-check@5c5dfc0ac2e225883c0e5f03a85311ec2830d368 #v1
            with:
                config-file: ./.github/.markdown-link-check.json
